name: Build Tools

# 注意：push 下若同时写 tags 与 paths，tag 推送也会被 paths 过滤。
# 为保证 v* tag 能构建并 create-release，此处不使用 paths。
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Apple Silicon (M1/M2/M3/M4…) 与 Intel 分别原生构建。
  # 不在此做 universal2：Python/Tk/pystray 的 universal 轮子在 CI 上不稳定。
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            zip_name: Count_Down_Tool_mac_arm64.zip
            artifact: count_down_tool_mac_arm64
          # macos-13 已于 2025-12 退役；Intel 请用 macos-15-intel（最后一代 x86_64 runner）
          - runner: macos-15-intel
            arch: x86_64
            zip_name: Count_Down_Tool_mac_x86_64.zip
            artifact: count_down_tool_mac_x86_64
    runs-on: ${{ matrix.runner }}
    name: Build macOS (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify host arch
        run: |
          set -euo pipefail
          echo "expected: ${{ matrix.arch }}"
          echo "uname -m: $(uname -m)"
          python -c "import platform; print('python machine:', platform.machine())"

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow

      - name: Build with PyInstaller
        working-directory: .
        run: |
          python -m PyInstaller \
            --noconfirm \
            --windowed \
            --name "Count Down Tool" \
            --target-arch ${{ matrix.arch }} \
            --osx-bundle-identifier "com.foundtec.count-down-tool" \
            --hidden-import countdown_core \
            --hidden-import themes \
            --hidden-import autostart \
            --hidden-import ui \
            --hidden-import ui.widgets \
            --hidden-import ui.mini_window \
            --hidden-import ui.time_picker \
            --hidden-import ui.full_window \
            --hidden-import ui.context_menus \
            --hidden-import services \
            --hidden-import services.tray \
            --hidden-import services.windows_native \
            --hidden-import pystray \
            --hidden-import pystray._darwin \
            --hidden-import PIL \
            --hidden-import PIL._tkinter_finder \
            count_down_tool.py

      - name: Package .app (chmod + ad-hoc sign + zip)
        working-directory: .
        run: |
          set -euo pipefail
          APP="dist/Count Down Tool.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: expected app bundle not found:"
            ls -la dist || true
            exit 1
          fi
          BIN="$APP/Contents/MacOS/Count Down Tool"
          if [ -f "$BIN" ]; then
            file "$BIN" || true
            lipo -info "$BIN" || true
          fi
          find "$APP" -type f \( -name "Count Down Tool" -o -path "*/MacOS/*" \) -exec chmod +x {} \;
          codesign --force --deep --sign - "$APP" || true
          codesign -dv --verbose=2 "$APP" || true
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Count Down Tool.app" "${{ matrix.zip_name }}"
          ls -lh "${{ matrix.zip_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.zip_name }}
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    name: Build count_down_tool (Windows)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow

      - name: Build with PyInstaller
        working-directory: .
        run: |
          python -m PyInstaller --onefile --windowed --name "count_down_tool" --icon="count_down_tool.ico" --add-data "count_down_tool.ico;." --hidden-import countdown_core --hidden-import themes --hidden-import autostart --hidden-import ui --hidden-import ui.widgets --hidden-import ui.mini_window --hidden-import ui.time_picker --hidden-import ui.full_window --hidden-import ui.context_menus --hidden-import services --hidden-import services.tray --hidden-import services.windows_native --hidden-import pystray --hidden-import pystray._win32 --hidden-import PIL --hidden-import PIL._tkinter_finder count_down_tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: count_down_tool_win
          path: dist/count_down_tool.exe
          if-no-files-found: error

  create-release:
    needs: [
      build-mac,
      build-windows
    ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 下载说明

            | 平台 | 文件 | 适用 |
            | --- | --- | --- |
            | Windows | `count_down_tool.exe` | 64 位 Windows |
            | macOS Apple Silicon | `Count_Down_Tool_mac_arm64.zip` | M1 / M2 / M3 / M4… |
            | macOS Intel | `Count_Down_Tool_mac_x86_64.zip` | Intel 芯片 Mac |

            不确定芯片：左上角 → 关于本机 → 芯片/处理器。  
            Apple Silicon 一般选 **arm64**；Intel 选 **x86_64**。

            ## macOS 首次打开
            1. 下载对应架构的 zip，解压得到 `Count Down Tool.app`
            2. 拖到「应用程序」
            3. 若提示无法验证开发者：右键 App →「打开」→ 再点「打开」
            4. 或终端：
               ```bash
               xattr -cr "/Applications/Count Down Tool.app"
               open "/Applications/Count Down Tool.app"
               ```
            > 当前为 CI 未公证（notarize）构建，仅适合自用/内部分发。
          files: |
            artifacts/count_down_tool_mac_arm64/Count_Down_Tool_mac_arm64.zip
            artifacts/count_down_tool_mac_x86_64/Count_Down_Tool_mac_x86_64.zip
            artifacts/count_down_tool_win/count_down_tool.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
