name: Build Tools

# 注意：push 下若同时写 tags 与 paths，tag 推送也会被 paths 过滤。
# 为保证 v* tag 能构建并 create-release，此处不使用 paths。
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Apple Silicon (M1/M2/M3/M4…) 与 Intel 分别原生构建。
  # 不在此做 universal2：Python/Tk/pystray 的 universal 轮子在 CI 上不稳定。
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          # zip_suffix：Release 对外文件名后缀；artifact：Actions 中间产物目录名
          - runner: macos-14
            arch: arm64
            zip_suffix: mac-arm64
            artifact: mac-arm64
          # macos-13 已于 2025-12 退役；Intel 请用 macos-15-intel（最后一代 x86_64 runner）
          - runner: macos-15-intel
            arch: x86_64
            zip_suffix: mac-x86_64
            artifact: mac-x86_64
    runs-on: ${{ matrix.runner }}
    name: Build macOS (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python -c "from core.countdown_core import __version__; print(__version__)")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Verify host arch
        run: |
          set -euo pipefail
          echo "expected: ${{ matrix.arch }}"
          echo "uname -m: $(uname -m)"
          python -c "import platform; print('python machine:', platform.machine())"

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow

      - name: Build with PyInstaller
        working-directory: .
        run: |
          python -m PyInstaller \
            --noconfirm \
            --windowed \
            --name "count_down_tool" \
            --target-arch ${{ matrix.arch }} \
            --osx-bundle-identifier "com.foundtec.count-down-tool" \
            --add-data "assets/count_down_tool.ico:assets" \
            --add-data "assets/sounds:assets/sounds" \
            --hidden-import core \
            --hidden-import core.countdown_core \
            --hidden-import core.themes \
            --hidden-import services.autostart \
            --hidden-import app \
            --hidden-import app.countdown \
            --hidden-import app.config_store \
            --hidden-import app.window_chrome \
            --hidden-import app.theme \
            --hidden-import app.mode \
            --hidden-import ui \
            --hidden-import ui.widgets \
            --hidden-import ui.mini_window \
            --hidden-import ui.time_picker \
            --hidden-import ui.full_window \
            --hidden-import ui.context_menus \
            --hidden-import ui.mini_text_picker \
            --hidden-import services \
            --hidden-import services.tray \
            --hidden-import services.mac_menu \
            --hidden-import services.sound \
            --hidden-import services.windows_native \
            --hidden-import pystray \
            --hidden-import pystray._darwin \
            --hidden-import PIL \
            --hidden-import PIL._tkinter_finder \
            count_down_tool.py

      - name: Package .app (chmod + ad-hoc sign + versioned zip)
        working-directory: .
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          ZIP_NAME="count_down_tool-${VERSION}-${{ matrix.zip_suffix }}.zip"
          APP="dist/count_down_tool.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: expected app bundle not found:"
            ls -la dist || true
            exit 1
          fi
          BIN="$APP/Contents/MacOS/count_down_tool"
          if [ -f "$BIN" ]; then
            file "$BIN" || true
            lipo -info "$BIN" || true
          fi
          find "$APP" -type f \( -name "count_down_tool" -o -path "*/MacOS/*" \) -exec chmod +x {} \;
          python scripts/set_macos_bundle_version.py "$APP" "$VERSION"
          /usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$APP/Contents/Info.plist" || true
          codesign --force --deep --sign - "$APP" || true
          codesign -dv --verbose=2 "$APP" || true
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "count_down_tool.app" "${ZIP_NAME}"
          ls -lh "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/count_down_tool-${{ steps.ver.outputs.version }}-${{ matrix.zip_suffix }}.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    name: Build count_down_tool (Windows)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python -c "from core.countdown_core import __version__; print(__version__)")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow

      - name: Build with PyInstaller
        working-directory: .
        run: |
          python -m PyInstaller --onefile --windowed --name "count_down_tool" --icon="assets/count_down_tool.ico" --add-data "assets/count_down_tool.ico;assets" --add-data "assets/sounds;assets/sounds" --hidden-import core --hidden-import core.countdown_core --hidden-import core.themes --hidden-import services.autostart --hidden-import app --hidden-import app.countdown --hidden-import app.config_store --hidden-import app.window_chrome --hidden-import app.theme --hidden-import app.mode --hidden-import ui --hidden-import ui.widgets --hidden-import ui.mini_window --hidden-import ui.time_picker --hidden-import ui.full_window --hidden-import ui.context_menus --hidden-import ui.mini_text_picker --hidden-import services --hidden-import services.tray --hidden-import services.sound --hidden-import services.windows_native --hidden-import pystray --hidden-import pystray._win32 --hidden-import PIL --hidden-import PIL._tkinter_finder count_down_tool.py

      - name: Package versioned zip (inner exe unversioned)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $VERSION = "${{ steps.ver.outputs.version }}"
          $zipName = "count_down_tool-${VERSION}-win64.zip"
          $exe = "dist/count_down_tool.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            Write-Error "expected exe not found"
            Get-ChildItem dist -ErrorAction SilentlyContinue
            exit 1
          }
          $zipPath = "dist/$zipName"
          if (Test-Path -LiteralPath $zipPath) { Remove-Item -LiteralPath $zipPath -Force }
          # zip 内保留固定名 count_down_tool.exe（与 mac 的 .app 一致）
          Compress-Archive -LiteralPath $exe -DestinationPath $zipPath -Force
          Get-Item -LiteralPath $zipPath | Format-List Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # artifact 仅作 CI 目录名；Release 附件为带版本 zip
          name: win-zip
          path: dist/count_down_tool-${{ steps.ver.outputs.version }}-win64.zip
          if-no-files-found: error

  create-release:
    needs: [
      build-mac,
      build-windows
    ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build release notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE=release_notes.md
          SECTION_FILE=changelog_section.md
          WIN_ZIP="count_down_tool-${VERSION}-win64.zip"
          MAC_ARM="count_down_tool-${VERSION}-mac-arm64.zip"
          MAC_X86="count_down_tool-${VERSION}-mac-x86_64.zip"

          # 从 CHANGELOG 提取对应版本段落（## x.y.z 至下一 ##）
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## " ver "( |$)" { found=1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md | sed -e 's/[[:space:]]*$//' | awk 'NF{p=1} p' > "$SECTION_FILE" || true
          else
            : > "$SECTION_FILE"
          fi

          if [ ! -s "$SECTION_FILE" ]; then
            echo "_（CHANGELOG 中未找到 ${VERSION} 条目，请查看提交记录）_" > "$SECTION_FILE"
          fi

          {
            echo "## 更新内容"
            echo ""
            cat "$SECTION_FILE"
            echo ""
            echo "## 下载说明"
            echo ""
            echo "| 平台 | 文件 | 适用 |"
            echo "| --- | --- | --- |"
            echo "| Windows | \`${WIN_ZIP}\` | 64 位 Windows，解压得 \`count_down_tool.exe\` |"
            echo "| macOS Apple Silicon | \`${MAC_ARM}\` | M1 / M2 / M3 / M4…，解压得 \`count_down_tool.app\` |"
            echo "| macOS Intel | \`${MAC_X86}\` | Intel 芯片 Mac，解压得 \`count_down_tool.app\` |"
            echo ""
            echo "不确定芯片：左上角 → 关于本机 → 芯片/处理器。"
            echo "Apple Silicon 一般选 **arm64**；Intel 选 **x86_64**。"
            echo ""
            echo "## Windows"
            echo "1. 下载 \`${WIN_ZIP}\`，解压得到固定名 \`count_down_tool.exe\`"
            echo "2. 双击运行即可（无需安装）"
            echo ""
            echo "## macOS 首次打开"
            echo "1. 下载对应架构的 zip，解压得到 \`count_down_tool.app\`"
            echo "2. 拖到「应用程序」"
            echo "3. 若提示无法验证开发者：右键 App →「打开」→ 再点「打开」"
            echo "4. 或终端："
            echo "   \`\`\`bash"
            echo "   xattr -cr \"/Applications/count_down_tool.app\""
            echo "   open \"/Applications/count_down_tool.app\""
            echo "   \`\`\`"
            echo "> 当前为 CI 未公证（notarize）构建，仅适合自用/内部分发。"
          } > "$NOTES_FILE"

          echo "----- release notes preview -----"
          cat "$NOTES_FILE"

          # 列出实际产物路径供上传
          find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            artifacts/mac-arm64/*
            artifacts/mac-x86_64/*
            artifacts/win-zip/*
          draft: false
          prerelease: false
          # 同 tag 重推时覆盖附件，避免 already_exists
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
