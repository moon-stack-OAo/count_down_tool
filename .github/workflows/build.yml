name: Build Tools

on:
  push:
    branches: [ main, master ]
    paths:
      - 'wechat_transparency.py'
      - 'wechat_transparency_mac.py'
      - '.github/workflows/build.yml'
      - 'build_exe.bat'
      - 'build_mac.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==================== wechat_tool ====================
  build-wechat-mac:
    runs-on: macos-latest
    name: Build wechat_tool (macOS)
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow pyobjc-framework-Quartz pyobjc-framework-Cocoa

      - name: Build with PyInstaller
        working-directory: .
        run: |
          python -m PyInstaller \
            --onefile \
            --windowed \
            --name "wechat_tool_mac" \
            --hidden-import pystray \
            --hidden-import pystray._darwin \
            --hidden-import PIL \
            --hidden-import PIL._tkinter_finder \
            --hidden-import AppKit \
            --hidden-import Quartz \
            wechat_transparency_mac.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat_tool_mac
          path: dist/wechat_tool_mac
          if-no-files-found: error

  build-wechat-windows:
    runs-on: windows-latest
    name: Build wechat_tool (Windows)
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow pywin32

      - name: Build with PyInstaller
        working-directory: .
        run: |
          python -m PyInstaller --onefile --windowed --name "wechat_tool_win" --hidden-import pystray --hidden-import pystray._win32 --hidden-import PIL --hidden-import PIL._tkinter_finder --hidden-import win32gui --hidden-import win32con wechat_transparency.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat_tool_win
          path: dist/wechat_tool_win.exe
          if-no-files-found: error

  # ==================== Release ====================
  create-release:
    needs: [
      build-wechat-mac,
      build-wechat-windows
    ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/wechat_tool_mac/wechat_tool_mac
            artifacts/wechat_tool_win/wechat_tool_win.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}