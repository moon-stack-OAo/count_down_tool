name: Build Tools

on:
  push:
    branches: [ main, master ]
    paths:
      - 'count_down_tool.py'
      - '.github/workflows/build.yml'
      - 'build_exe.bat'
      - 'build_mac.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==================== count_down_tool ====================
  build-mac:
    runs-on: macos-latest
    name: Build count_down_tool (macOS)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow

      - name: Build with PyInstaller
        working-directory: .
        run: |
          python -m PyInstaller \
            --onefile \
            --windowed \
            --name "count_down_tool" \
            --hidden-import pystray \
            --hidden-import pystray._darwin \
            --hidden-import PIL \
            --hidden-import PIL._tkinter_finder \
            count_down_tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: count_down_tool_mac
          path: dist/count_down_tool
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    name: Build count_down_tool (Windows)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pystray pillow

      - name: Build with PyInstaller
        working-directory: .
        run: |
          python -m PyInstaller --onefile --windowed --name "count_down_tool" --icon="count_down_tool.ico" --add-data "count_down_tool.ico;." --hidden-import pystray --hidden-import pystray._win32 --hidden-import PIL --hidden-import PIL._tkinter_finder count_down_tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: count_down_tool_win
          path: dist/count_down_tool.exe
          if-no-files-found: error

  # ==================== Release ====================
  create-release:
    needs: [
      build-mac,
      build-windows
    ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/count_down_tool_mac/count_down_tool
            artifacts/count_down_tool_win/count_down_tool.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}